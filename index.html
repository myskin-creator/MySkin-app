<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>MySkin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --mint:#B5D5C5;--mint-light:#E8F5EE;--mint-deep:#7AAF96;
      --rose:#F2C4CE;--rose-light:#FAF0F2;--rose-deep:#C47A8A;--rose-text:#7A3545;
      --lav:#C9B8D8;--lav-light:#F0EBF8;--lav-deep:#8A70A8;
      --warm:#FDFAF8;--surface:#FFFFFF;
      --text:#2C1A20;--text2:#7A6870;--text3:#B8A8B0;
      --border:rgba(194,122,138,0.15);--border2:rgba(194,122,138,0.25);
      --ok:#6A9E7A;--ok-bg:#EEF5F0;
      --bad:#C85A6A;--bad-bg:#FDEEF0;
      --warn:#B8905A;--warn-bg:#FDF4EC;
      --r:16px;--rsm:10px;--sh:0 2px 16px rgba(180,100,130,0.1)
    }
    html,body{height:100%;background:var(--warm);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
    .screen{display:none;min-height:100dvh;flex-direction:column}
    .screen.active{display:flex}
    .top-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(253,250,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top) 0 0}
    .top-nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0}
    .app-logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--rose-text);letter-spacing:-0.01em}
    .lang-toggle{display:flex;gap:4px}
    .lang-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);background:transparent}
    .lang-btn.active{background:var(--rose-deep);color:#fff;border-color:var(--rose-deep)}
    .tab-strip{display:flex;padding:8px 20px 0;gap:4px;overflow-x:auto;scrollbar-width:none}
    .tab-strip::-webkit-scrollbar{display:none}
    .tab-item{white-space:nowrap;padding:7px 14px;border-radius:20px 20px 0 0;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border:none;background:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;border-bottom:2px solid transparent}
    .tab-item.active{color:var(--rose-deep);border-bottom-color:var(--rose-deep)}
    .scroll-content{flex:1;overflow-y:auto;padding:0 20px 100px;margin-top:110px}
    .card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px;margin-bottom:12px;box-shadow:var(--sh)}
    .clabel{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
    .search-hero{background:linear-gradient(135deg,#F0E8F5 0%,#E8F5EE 50%,#FAF0F2 100%);border-radius:var(--r);padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden}
    .search-hero h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--text);margin-bottom:4px}
    .search-hero p{font-size:12px;color:var(--text2);margin-bottom:14px}
    .search-row{display:flex;gap:8px}
    .search-input{flex:1;background:rgba(255,255,255,0.9);border:1px solid var(--border2);color:var(--text);border-radius:50px;padding:11px 18px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
    .search-input:focus{border-color:var(--rose-deep)}
    .search-btn{background:var(--rose-deep);color:#fff;border:none;border-radius:50px;padding:11px 20px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer}
    .prod-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .prod-row:last-child{border-bottom:none}
    .prod-img{width:48px;height:48px;border-radius:12px;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
    .prod-img img{width:100%;height:100%;object-fit:cover}
    .prod-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .prod-brand{font-size:11px;color:var(--text2);margin-top:1px}
    .badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}
    .badge-ok{background:var(--ok-bg);color:var(--ok)}
    .badge-bad{background:var(--bad-bg);color:var(--bad)}
    .badge-warn{background:var(--warn-bg);color:var(--warn)}
    .badge-mint{background:var(--mint-light);color:var(--mint-deep)}
    .badge-lav{background:var(--lav-light);color:var(--lav-deep)}
    .alert{border-radius:var(--rsm);padding:13px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start}
    .alert.ok{background:var(--ok-bg);border:1px solid rgba(106,158,122,0.25)}
    .alert.bad{background:var(--bad-bg);border:1px solid rgba(200,90,106,0.25)}
    .alert.warn{background:var(--warn-bg);border:1px solid rgba(184,144,90,0.25)}
    .alert.info{background:var(--lav-light);border:1px solid rgba(138,112,168,0.25)}
    .alert-icon{font-size:17px;flex-shrink:0;margin-top:1px}
    .alert-title{font-size:13px;font-weight:500}
    .alert-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
    #screen-onboarding{background:var(--warm);padding:0;justify-content:flex-start;align-items:center}
    .ob-wrap{width:100%;max-width:420px;padding:60px 28px 40px;display:flex;flex-direction:column;align-items:center;text-align:center}
    .ob-logo{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:var(--rose-text);letter-spacing:-0.02em;line-height:1}
    .ob-tagline{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--lav-deep);margin-top:6px;margin-bottom:48px}
    .ob-step-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--text);margin-bottom:8px}
    .ob-step-sub{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6;max-width:300px}
    .ob-progress{display:flex;gap:5px;margin-bottom:28px}
    .ob-dot{height:4px;border-radius:2px;background:var(--border2);transition:all 0.3s}
    .ob-options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:340px;margin-bottom:24px}
    .ob-options-col{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px;margin-bottom:24px}
    .ob-chip{background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:10px 14px;font-size:13px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);transition:all 0.2s;display:flex;align-items:center;gap:8px}
    .ob-chip.selected{border-color:var(--rose-deep);background:var(--rose-light);color:var(--rose-text)}
    .ob-chip .chip-icon{font-size:16px;flex-shrink:0}
    .ob-chip .chip-text{font-size:12px;font-weight:500}
    .ob-chip .chip-sub{font-size:10px;color:var(--text3);display:block;margin-top:1px}
    .ob-input{width:100%;max-width:340px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:13px 16px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;margin-bottom:8px}
    .ob-input:focus{border-color:var(--rose-deep)}
    .btn-primary{background:var(--rose-deep);color:#fff;border:none;border-radius:50px;padding:15px 40px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;width:100%;max-width:340px;transition:opacity 0.2s}
    .btn-primary:disabled{opacity:0.4;cursor:not-allowed}
    .btn-secondary{background:transparent;color:var(--text2);border:1.5px solid var(--border2);border-radius:50px;padding:12px 40px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;max-width:340px;margin-top:8px}
    .modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(44,26,32,0.45);align-items:flex-end}
    .modal-overlay.open{display:flex}
    .modal-sheet{background:var(--warm);border-radius:28px 28px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:16px 20px 48px}
    .modal-handle{width:32px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:4px}
    .modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
    .pd-img{width:76px;height:76px;border-radius:16px;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;overflow:hidden;border:1px solid var(--border)}
    .pd-img img{width:100%;height:100%;object-fit:cover}
    .ing-chip{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text2);margin:3px}
    .ing-chip.key{background:var(--rose-light);color:var(--rose-text);border-color:var(--border2);font-weight:500}
    .ing-chip.good{background:var(--ok-bg);color:var(--ok)}
    .ing-chip.bad{background:var(--bad-bg);color:var(--bad)}
    .btn-row{display:flex;gap:8px;margin-top:18px}
    .btn-cta{flex:1;background:var(--rose-deep);color:#fff;border:none;border-radius:50px;padding:13px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer}
    .btn-outline{flex:1;background:transparent;border:1.5px solid var(--border2);border-radius:50px;padding:13px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text2);cursor:pointer}
    .score-block{border-radius:var(--r);padding:16px;margin-bottom:14px;text-align:center}
    .step-card{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);margin-bottom:6px}
    .step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
    .step-num.am{background:var(--mint-light);color:var(--mint-deep)}
    .step-num.pm{background:var(--lav-light);color:var(--lav-deep)}
    .step-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .step-note{font-size:11px;color:var(--text2)}
    .combine-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);margin-bottom:8px}
    .empty{text-align:center;padding:48px 20px}
    .empty h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:6px}
    .empty p{font-size:13px;color:var(--text2);line-height:1.6}
    .profile-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
    .profile-row:last-child{border-bottom:none}
    .multi-tag{display:inline-block;background:var(--rose-light);color:var(--rose-text);border-radius:20px;padding:3px 10px;font-size:11px;margin:2px}
    .skin-tag{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--rose-light);color:var(--rose-text);border:1px solid var(--border);display:inline-block;margin:2px}
    .tab-btn-row{display:flex;gap:8px;margin-bottom:16px}
    .tab-btn{flex:1;padding:10px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}
    .tab-btn.active{background:var(--rose-deep);color:#fff;border:1.5px solid var(--rose-deep)}
    .tab-btn.inactive{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
  </style>
</head>
<body>
<div id="screen-onboarding" class="screen active">
  <div class="ob-wrap">
    <div class="ob-progress" id="ob-progress"></div>
    <div id="ob-content"></div>
  </div>
</div>
<div id="screen-app" class="screen">
  <div class="top-nav">
    <div class="top-nav-inner">
      <div class="app-logo">MySkin</div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btn-bg" onclick="setLang('bg')">БГ</button>
      </div>
    </div>
    <div class="tab-strip">
      <button class="tab-item active" id="tab-home" onclick="showTab('home')" data-en="Search" data-bg="Търси">Search</button>
      <button class="tab-item" id="tab-products" onclick="showTab('products')" data-en="My Products" data-bg="Моите">My Products</button>
      <button class="tab-item" id="tab-routine" onclick="showTab('routine')" data-en="Routine" data-bg="Рутина">Routine</button>
      <button class="tab-item" id="tab-profile" onclick="showTab('profile')" data-en="Profile" data-bg="Профил">Profile</button>
    </div>
  </div>
  <div class="scroll-content">
    <div id="tab-content-home"></div>
    <div id="tab-content-products" style="display:none"></div>
    <div id="tab-content-routine" style="display:none"></div>
    <div id="tab-content-profile" style="display:none"></div>
  </div>
</div>
<div class="modal-overlay" id="product-modal"><div class="modal-sheet"><div class="modal-handle"></div><div id="product-modal-content"></div></div></div>
<div class="modal-overlay" id="combine-modal"><div class="modal-sheet"><div class="modal-handle"></div><div id="combine-modal-content"></div></div></div>
<script>
let lang=localStorage.getItem('myskin_lang')||'en';
let profile=JSON.parse(localStorage.getItem('myskin_profile')||'null');
let myProducts=JSON.parse(localStorage.getItem('myskin_products')||'[]');
let badProducts=JSON.parse(localStorage.getItem('myskin_bad_products')||'[]');
let currentTab='home';
let combineList=[];

const T={
  en:{search_title:'Find a product',search_sub:'Search by name — Bioderma, Avène, The Ordinary…',search_placeholder:'Product name…',search_btn:'Search',no_products:'No products yet',no_products_sub:'Search and save products to begin',save_product:'Save to my products',combine_btn:'Combine',suitable:'Suitable for your skin',partially:'Partially suitable',not_suitable:'Not recommended for you',key_ings:'Key ingredients',all_ings:'Full ingredients',for_your_goals:'Helps with your goals',watch_out:'Watch out',conflicts:'Conflicts with your products',compatible:'Compatible with your routine',am_routine:'Morning routine',pm_routine:'Evening routine',check_routine:'Check my routine',create_routine:'Create a routine',analyse:'Analyse',profile_title:'My Profile',edit_profile:'Edit profile',skin_type:'Skin type',concerns:'Skin concerns',goals:'Goals',bad_ings:'Ingredients I avoid',good_ings:'Ingredients I love',bad_products_tab:"Products that didn't work",reset:'Reset all data',searching:'🔍 Searching…',not_found:'No products found. Try a different name.',combining_title:'Combining products',combining_sub:'Add more products to compare',analyse_combo:'Analyse combination',routine_analysis:'Routine analysis'},
  bg:{search_title:'Намери продукт',search_sub:'Търси по име — Bioderma, Avène, The Ordinary…',search_placeholder:'Име на продукт…',search_btn:'Търси',no_products:'Няма добавени продукти',no_products_sub:'Търси и запазвай продукти',save_product:'Запази продукта',combine_btn:'Комбинирай',suitable:'Подходящ за теб',partially:'Частично подходящ',not_suitable:'Не се препоръчва за теб',key_ings:'Ключови съставки',all_ings:'Всички съставки',for_your_goals:'Помага за твоите цели',watch_out:'Внимание',conflicts:'Конфликти с твоите продукти',compatible:'Съвместим с рутината ти',am_routine:'Сутрешна рутина',pm_routine:'Вечерна рутина',check_routine:'Провери рутината ми',create_routine:'Създай рутина',analyse:'Анализирай',profile_title:'Моят профил',edit_profile:'Редактирай профила',skin_type:'Тип кожа',concerns:'Проблеми',goals:'Цели',bad_ings:'Съставки които избягвам',good_ings:'Съставки които харесвам',bad_products_tab:'Продукти, които не ми отиват',reset:'Изтрий всички данни',searching:'🔍 Търся…',not_found:'Няма намерени продукти. Опитай с друго.',combining_title:'Комбиниране на продукти',combining_sub:'Добави още продукти за сравнение',analyse_combo:'Анализирай комбинацията',routine_analysis:'Анализ на рутина'}
};

function t(k){return T[lang][k]||T.en[k]||k;}

function setLang(l){
  lang=l;localStorage.setItem('myskin_lang',l);
  document.getElementById('btn-en').className='lang-btn'+(l==='en'?' active':'');
  document.getElementById('btn-bg').className='lang-btn'+(l==='bg'?' active':'');
  document.querySelectorAll('.tab-item').forEach(el=>{el.textContent=el.dataset[l]||el.dataset.en;});
  renderTab(currentTab);
}

const CONFLICTS=[
  {a:'retinol',b:'glycolic acid',level:'bad',en:'Retinol + Glycolic Acid — very irritating together. Use on separate nights.',bg:'Ретинол + Гликолова киселина — твърде дразнещо. Ползвай в различни вечери.'},
  {a:'retinol',b:'aha',level:'bad',en:'Retinol + AHA can damage your skin barrier. Alternate nights.',bg:'Ретинол + AHA могат да увредят кожната бариера. Редувай вечери.'},
  {a:'retinol',b:'salicylic acid',level:'bad',en:'Retinol + Salicylic Acid — risk of over-irritation. Alternate days.',bg:'Ретинол + Салицилова киселина — риск от дразнене. Редувай дни.'},
  {a:'retinol',b:'bha',level:'bad',en:'Retinol + BHA — too strong together. Alternate days.',bg:'Ретинол + BHA — твърде силно. Редувай дни.'},
  {a:'vitamin c',b:'retinol',level:'warn',en:'Vitamin C morning + Retinol at night works best.',bg:'Витамин С сутрин + Ретинол вечер — оптималната комбинация.'},
  {a:'vitamin c',b:'niacinamide',level:'warn',en:'Vitamin C + Niacinamide can reduce effectiveness. Use at different times.',bg:'Витамин С + Ниацинамид могат да намалят ефекта. Ползвай по различно време.'},
  {a:'vitamin c',b:'glycolic acid',level:'warn',en:'Both acidic — use Vitamin C morning, Glycolic Acid at night.',bg:'И двете са киселинни — Витамин С сутрин, Гликолова вечер.'},
  {a:'benzoyl peroxide',b:'retinol',level:'bad',en:'Benzoyl Peroxide deactivates Retinol. Never use together.',bg:'Бензоил пероксид деактивира Ретинола. Никога заедно.'},
  {a:'glycolic acid',b:'salicylic acid',level:'warn',en:'Two acids together can over-exfoliate. Alternate days.',bg:'Две киселини заедно могат да преексфолират. Редувай дни.'},
  {a:'lactic acid',b:'retinol',level:'warn',en:'Lactic Acid + Retinol — use on alternate nights.',bg:'Млечна киселина + Ретинол — ползвай в различни вечери.'},
];

const COMPATIBLE_PAIRS=[
  {a:'hyaluronic acid',b:'vitamin c',en:'Great combo — HA boosts Vitamin C absorption.',bg:'Страхотна комбинация — ХА подобрява усвояването на Витамин С.'},
  {a:'hyaluronic acid',b:'retinol',en:'HA buffers Retinol irritation. Apply HA first.',bg:'ХА намалява дразненето от Ретинол. Нанеси ХА първо.'},
  {a:'niacinamide',b:'spf',en:'Excellent daytime duo for protection and brightening.',bg:'Отличен дуо за защита и избистряне на тена.'},
  {a:'ceramide',b:'retinol',en:'Ceramides repair the barrier weakened by Retinol.',bg:'Церамидите поправят бариерата, отслабена от Ретинола.'},
  {a:'vitamin c',b:'spf',en:'The ultimate morning combo — antioxidant + sun protection.',bg:'Идеалната сутрешна комбинация — антиоксидант + слънцезащита.'},
  {a:'peptide',b:'hyaluronic acid',en:'Anti-aging + hydration — excellent combination.',bg:'Анти-ейдж + хидратация — отлична комбинация.'},
  {a:'niacinamide',b:'hyaluronic acid',en:'Brightening + hydration — great for combination skin.',bg:'Избистряне + хидратация — чудесно за смесена кожа.'},
];

const INGREDIENT_GOALS={
  'retinol':['aging','wrinkles','texture'],'vitamin c':['brightening','pigmentation','aging'],
  'niacinamide':['pores','oiliness','brightening','redness'],'hyaluronic acid':['hydration','dryness'],
  'glycolic acid':['texture','brightening','acne'],'salicylic acid':['acne','pores','oiliness'],
  'spf':['aging','pigmentation','prevention'],'ceramide':['dryness','sensitivity','barrier'],
  'peptide':['aging','wrinkles','firmness'],'squalane':['dryness','hydration'],
  'bakuchiol':['aging','wrinkles','sensitivity'],'lactic acid':['texture','hydration','brightening'],
  'zinc':['acne','oiliness'],'azelaic acid':['pigmentation','acne','redness'],
};

const GOAL_LABELS={
  en:{aging:'Anti-aging',wrinkles:'Wrinkles',texture:'Texture',brightening:'Brightening',pigmentation:'Pigmentation',hydration:'Hydration',dryness:'Dryness',acne:'Acne',pores:'Pores',oiliness:'Oiliness',redness:'Redness',sensitivity:'Sensitivity',firmness:'Firming',barrier:'Barrier repair',prevention:'Prevention'},
  bg:{aging:'Анти-ейдж',wrinkles:'Бръчки',texture:'Текстура',brightening:'Избистряне',pigmentation:'Пигментация',hydration:'Хидратация',dryness:'Сухота',acne:'Акне',pores:'Пори',oiliness:'Омазняване',redness:'Зачервяване',sensitivity:'Чувствителност',firmness:'Стягане',barrier:'Бариера',prevention:'Превенция'},

function toggleArr(key,val){
  const arr=obData[key];
  if(val==='none'){obData[key]=arr.includes('none')?[]:['none'];}
  else{const ni=arr.indexOf('none');if(ni>=0)arr.splice(ni,1);const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);else arr.push(val);}
  renderOnboarding();
}

function nextObStep(){if(obStep<OB_STEPS.length-1){obStep++;renderOnboarding();}else{finishOnboarding();}}
function prevObStep(){if(obStep>0){obStep--;renderOnboarding();}}

  lang=obData.lang;localStorage.setItem('myskin_lang',lang);

function buildProduct(p){
  const ings=p.ingredients_text_en||p.ingredients_text||'';
  return{barcode:p.code||String(Date.now()),name:p.product_name||'Unknown',brand:p.brands||'',image:p.image_front_small_url||'',ingredients:ings,keyIngredients:extractKey(ings)};
}

function getProfileScore(product){
  if(!profile)return{cls:'badge-lav',short:'—',level:0};
  const ki=product.keyIngredients||[];
  const userGoals=profile.goals||[];
  const userBadIngs=(profile.badIngs||'').toLowerCase().split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
  const userSens=(profile.sensitivities||[]).filter(v=>v!=='none');
  let bad=0,good=0;
  ki.forEach(ing=>{
    if(userBadIngs.some(b=>ing.includes(b)||b.includes(ing)))bad++;
    if(userSens.some(s=>ing.includes(s.replace('_',' '))))bad++;
    if((INGREDIENT_GOALS[ing]||[]).some(g=>userGoals.includes(g)))good++;
  });
  if(bad>0)return{cls:'badge-bad',short:lang==='bg'?'Внимание':'Watch out',level:-1};
  if(good>=2)return{cls:'badge-ok',short:lang==='bg'?'Подходящ':'Suitable',level:2};
  if(good>=1)return{cls:'badge-warn',short:lang==='bg'?'Частично':'Partial',level:1};
  return{cls:'badge-lav',short:lang==='bg'?'Неутрален':'Neutral',level:0};
}
  function openProductModal(product){
  const score=getProfileScore(product);
  const userGoals=profile?(profile.goals||[]):[];
  const userBadIngs=profile?(profile.badIngs||'').toLowerCase().split(/[,\n]/).map(s=>s.trim()).filter(Boolean):[];
  const userGoodIngs=profile?(profile.goodIngs||'').toLowerCase().split(/[,\n]/).map(s=>s.trim()).filter(Boolean):[];
  const ki=product.keyIngredients||[];
  const matchedGoals=[...new Set(ki.flatMap(ing=>(INGREDIENT_GOALS[ing]||[]).filter(g=>userGoals.includes(g))))];
  const badKi=ki.filter(ing=>userBadIngs.some(b=>ing.includes(b)||b.includes(ing)));
  const goodKi=ki.filter(ing=>userGoodIngs.some(g=>ing.includes(g)||g.includes(ing)));
  const conflicts=checkConflicts(product);
  const imgHtml=product.image?`<img src="${product.image}" onerror="this.parentElement.innerHTML='🌸'"/>`:'🌸';
  let html=`<div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:18px">
    <div class="pd-img">${imgHtml}</div>
    <div><div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;line-height:1.2">${product.name}</div>

  </div>`;
  const scoreEmoji=score.level===2?'✅':score.level===1?'⚠️':score.level===-1?'⛔':'➖';
  const scoreTitle=score.level===2?t('suitable'):score.level===1?t('partially'):score.level===-1?t('not_suitable'):(lang==='bg'?'Неутрален':'Neutral');
  const scoreBg=score.level===2?'var(--ok-bg)':score.level===-1?'var(--bad-bg)':'var(--warn-bg)';
  html+=`<div style="background:${scoreBg};border-radius:var(--r);padding:14px;margin-bottom:14px;text-align:center">
    <div style="font-size:28px">${scoreEmoji}</div>
    <div style="font-size:14px;font-weight:500;margin-top:6px">${scoreTitle}</div>
  </div>`;
  if(matchedGoals.length>0){
    html+=`<div style="margin-bottom:14px"><div class="clabel">${t('for_your_goals')}</div>
      <div>${matchedGoals.map(g=>`<span class="badge badge-ok" style="margin:2px">${GOAL_LABELS[lang]?.[g]||GOAL_LABELS.en[g]||g}</span>`).join('')}</div></div>`;
  }
  if(badKi.length>0){
    html+=`<div class="alert bad" style="margin-bottom:12px"><div class="alert-icon">⛔</div>
      <div><div class="alert-title">${t('watch_out')}</div>
      <div class="alert-desc">${lang==='bg'?'Съдържа съставки, които избягваш':'Contains ingredients you avoid'}: ${badKi.join(', ')}</div></div></div>`;
  }
  if(goodKi.length>0){
    html+=`<div class="alert ok" style="margin-bottom:12px"><div class="alert-icon">💚</div>
      <div><div class="alert-title">${lang==='bg'?'Любими съставки':'Ingredients you love'}</div>
      <div class="alert-desc">${goodKi.join(', ')}</div></div></div>`;
  }
  if(conflicts.length>0){
    html+=`<div style="margin-bottom:14px"><div class="clabel">${t('conflicts')}</div>
      ${conflicts.map(c=>`<div class="alert ${c.level}"><div class="alert-icon">${c.level==='bad'?'🚫':'⚠️'}</div>
      <div><div class="alert-title">${c[lang]||c.en}</div></div></div>`).join('')}</div>`;
  }else if(myProducts.length>0){
    html+=`<div class="alert ok" style="margin-bottom:14px"><div class="alert-icon">✅</div>
      <div><div class="alert-title">${t('compatible')}</div></div></div>`;
  }
  if(ki.length>0){
    html+=`<div style="margin-bottom:14px"><div class="clabel">${t('key_ings')}</div>
      <div>${ki.map(i=>`<span class="ing-chip key">${i}</span>`).join('')}</div></div>`;

      <p style="font-size:11px;color:var(--text2);line-height:1.7">${product.ingredients.substring(0,500)}${product.ingredients.length>500?'…':''}</p></div>`;
  }
  const saved=myProducts.find(p=>p.barcode===product.barcode);
  html+=`<div class="btn-row">

}

function addToCombine(product){if(!combineList.find(p=>p.barcode===product.barcode))combineList.push(product);renderCombineModal();}
function removeCombine(i){combineList.splice(i,1);renderCombineModal();}

function analyseCombo(){
  const allKi=combineList.flatMap(p=>p.keyIngredients||[]);
  const conflicts=[];
  CONFLICTS.forEach(c=>{if(allKi.some(i=>i.includes(c.a))&&allKi.some(i=>i.includes(c.b)))conflicts.push(c);});
  const compatFound=COMPATIBLE_PAIRS.filter(c=>allKi.some(i=>i.includes(c.a))&&allKi.some(i=>i.includes(c.b)));
  const am=[],pm=[];
  combineList.forEach(p=>{
    const k=p.keyIngredients||[];
    const isPM=k.some(x=>['retinol','aha','bha','glycolic acid','salicylic acid','lactic acid'].includes(x));
    const isAM=k.some(x=>['spf','vitamin c'].includes(x));
    if(isPM&&!isAM)pm.push(p);else if(isAM&&!isPM)am.push(p);else{am.push(p);pm.push(p);}
  });
  let html=`<div class="modal-title">${lang==='bg'?'Резултат':'Analysis Result'}</div>`;
  if(conflicts.length===0){
    html+=`<div class="alert ok" style="margin-bottom:12px"><div class="alert-icon">✅</div><div><div class="alert-title">${lang==='bg'?'Продуктите се комбинират добре!':'These products combine well!'}</div></div></div>`;
  }else{
    html+=`<div class="clabel">${lang==='bg'?'Конфликти':'Conflicts'}</div>`;
    html+=conflicts.map(c=>`<div class="alert ${c.level}" style="margin-bottom:6px"><div class="alert-icon">${c.level==='bad'?'🚫':'⚠️'}</div><div><div class="alert-title">${c[lang]||c.en}</div></div></div>`).join('');
  }
  if(compatFound.length>0){
    html+=`<div class="clabel" style="margin-top:10px">${lang==='bg'?'Добри комбинации':'Great combinations'}</div>`;
    html+=compatFound.map(c=>`<div class="alert ok" style="margin-bottom:6px"><div class="alert-icon">💚</div><div><div class="alert-title">${c[lang]||c.en}</div></div></div>`).join('');
  }
  if(am.length>0){
    html+=`<div class="clabel" style="margin-top:10px">☀️ ${t('am_routine')}</div>`;
    html+=am.map((p,i)=>`<div class="step-card"><div class="step-num am">${i+1}</div><div class="step-name">${p.name}</div></div>`).join('');
  }
  if(pm.length>0){
    html+=`<div class="clabel" style="margin-top:10px">🌙 ${t('pm_routine')}</div>`;
    html+=pm.map((p,i)=>`<div class="step-card"><div class="step-num pm">${i+1}</div><div class="step-name">${p.name}</div></div>`).join('');
  }
  html+=`<button onclick="closeModal('combine-modal')" style="width:100%;background:none;border:none;padding:12px;font-size:12px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px">${lang==='bg'?'Затвори':'Close'}</button>`;
  document.getElementById('combine-modal-content').innerHTML=html;
}

function renderProducts(){
  const el=document.getElementById('tab-content-products');
  let html='';
  if(myProducts.length>0){
    html+=`<div class="clabel">${lang==='bg'?'Запазени продукти':'Saved products'} (${myProducts.length})</div><div class="card">`;
    html+=myProducts.map((p,i)=>{
      const score=getProfileScore(p);
      return `<div class="prod-row" onclick='openProductModal(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
        <div class="prod-img">${p.image?`<img src="${p.image}" onerror="this.parentElement.innerHTML='🌸'"/>`:'🌸'}</div>
        <div style="flex:1;min-width:0"><div class="prod-name">${p.name}</div><div class="prod-brand">${p.brand||''}</div></div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="badge ${score.cls}">${score.short}</span>
          <button onclick="event.stopPropagation();removeProduct(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px">✕</button>
        </div>
      </div>`;
    }).join('');
    html+=`</div>`;
  }
  html+=`<div class="clabel" style="margin-top:16px">${t('bad_products_tab')}</div><div class="card">`;
  if(badProducts.length>0){
    html+=badProducts.map((p,i)=>`<div class="prod-row">
      <div class="prod-img" style="font-size:20px">❌</div>
      <div style="flex:1;min-width:0"><div class="prod-name">${p.name}</div><div class="prod-brand">${p.note||''}</div></div>
      <button onclick="removeBadProduct(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px">✕</button>
    </div>`).join('');
  }
  html+=`<div style="padding:12px 0;${badProducts.length?'border-top:1px solid var(--border)':''}">
    <div class="search-row">
      <input id="bad-prod-input" class="search-input" placeholder="${lang==='bg'?'Продукт, който не ми отиде':'Product that did not work'}" style="background:var(--warm)"/>
      <button class="search-btn" onclick="addBadProduct()">${lang==='bg'?'Добави':'Add'}</button>
    </div>
  </div></div>`;
  if(myProducts.length===0&&badProducts.length===0){
    el.innerHTML=`<div class="empty"><div style="font-size:40px;margin-bottom:14px">🌸</div><h3>${t('no_products')}</h3><p>${t('no_products_sub')}</p></div>`;
    return;
  }
  el.innerHTML=html;
}

function saveProduct(product){
  if(!myProducts.find(p=>p.barcode===product.barcode)){myProducts.push(product);localStorage.setItem('myskin_products',JSON.stringify(myProducts));}
  closeModal('product-modal');
  if(currentTab==='products')renderProducts();
}

function removeProduct(i){myProducts.splice(i,1);localStorage.setItem('myskin_products',JSON.stringify(myProducts));renderProducts();}
function addBadProduct(){const v=document.getElementById('bad-prod-input').value.trim();if(!v)return;badProducts.push({name:v,addedAt:Date.now()});localStorage.setItem('myskin_bad_products',JSON.stringify(badProducts));renderProducts();}
function removeBadProduct(i){badProducts.splice(i,1);localStorage.setItem('myskin_bad_products',JSON.stringify(badProducts));renderProducts();}

function renderRoutine(){
  const el=document.getElementById('tab-content-routine');
  el.innerHTML=`<div class="tab-btn-row">
    <button class="tab-btn active" id="rbtn-check" onclick="showRoutineSection('check')">${t('check_routine')}</button>
    <button class="tab-btn inactive" id="rbtn-create" onclick="showRoutineSection('create')">${t('create_routine')}</button>
  </div><div id="routine-section"></div>`;
  showRoutineSection('check');
}

function showRoutineSection(type){
  const el=document.getElementById('routine-section');
  document.getElementById('rbtn-check').className='tab-btn '+(type==='check'?'active':'inactive');
  document.getElementById('rbtn-create').className='tab-btn '+(type==='create'?'active':'inactive');
  if(type==='check'){
    if(myProducts.length<2){el.innerHTML=`<div class="empty"><div style="font-size:40px;margin-bottom:14px">🌿</div><h3>${lang==='bg'?'Нужни са поне 2 продукта':'Need at least 2 products'}</h3><p>${lang==='bg'?'Добави продукти от Search':'Add products from Search tab'}</p></div>`;return;}
    const allKi=myProducts.flatMap(p=>p.keyIngredients||[]);
    const conflicts=[];
    CONFLICTS.forEach(c=>{if(allKi.some(i=>i.includes(c.a))&&allKi.some(i=>i.includes(c.b)))conflicts.push(c);});
    const am=[],pm=[];
    myProducts.forEach(p=>{
      const k=p.keyIngredients||[];
      const isPM=k.some(x=>['retinol','aha','bha','glycolic acid','salicylic acid','lactic acid'].includes(x));
      const isAM=k.some(x=>['spf','vitamin c'].includes(x));
      if(isPM&&!isAM)pm.push(p);else if(isAM&&!isPM)am.push(p);else{am.push(p);pm.push(p);}
    });
    const userGoals=profile?(profile.goals||[]):[];
    const allBenefits=[...new Set(allKi.flatMap(i=>(INGREDIENT_GOALS[i]||[]).filter(g=>userGoals.includes(g))))];
    let html='';
    if(conflicts.length===0){
      html+=`<div class="alert ok" style="margin-bottom:12px"><div class="alert-icon">✅</div><div><div class="alert-title">${lang==='bg'?'Всички продукти се комбинират добре':'All products combine well'}</div></div></div>`;
    }else{
      html+=`<div class="clabel">${lang==='bg'?'Конфликти':'Conflicts'}</div>`;
      html+=conflicts.map(c=>`<div class="alert ${c.level}" style="margin-bottom:8px"><div class="alert-icon">${c.level==='bad'?'🚫':'⚠️'}</div><div><div class="alert-title">${c[lang]||c.en}</div></div></div>`).join('');
    }
    if(allBenefits.length>0){
      html+=`<div class="card" style="margin-top:12px"><div class="clabel">${lang==='bg'?'Какво постигаш с тази рутина':'What your routine achieves'}</div>
        ${allBenefits.map(g=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><span>🌸</span><span style="font-size:13px">${GOAL_LABELS[lang]?.[g]||GOAL_LABELS.en[g]||g}</span></div>`).join('')}</div>`;
    }
    if(am.length>0){html+=`<div class="clabel" style="margin-top:14px">☀️ ${t('am_routine')}</div>`;html+=am.map((p,i)=>`<div class="step-card"><div class="step-num am">${i+1}</div><div class="step-name">${p.name}</div><div class="step-note">${p.brand||''}</div></div>`).join('');}
    if(pm.length>0){html+=`<div class="clabel" style="margin-top:14px">🌙 ${t('pm_routine')}</div>`;html+=pm.map((p,i)=>`<div class="step-card"><div class="step-num pm">${i+1}</div><div class="step-name">${p.name}</div><div class="step-note">${p.brand||''}</div></div>`).join('');}
    el.innerHTML=html;
  }else{
    const userGoals=profile?(profile.goals||[]):[];
    const goalSuggestions={hydration:['hyaluronic acid','ceramide','squalane'],aging:['retinol','peptide','vitamin c'],brightening:['vitamin c','niacinamide','glycolic acid'],acne:['salicylic acid','niacinamide','zinc'],pigmentation:['vitamin c','azelaic acid','niacinamide'],barrier:['ceramide','squalane','hyaluronic acid'],sensitivity:['ceramide','bakuchiol','hyaluronic acid'],firmness:['peptide','retinol','vitamin c'],pores:['niacinamide','salicylic acid','zinc']};
    const suggestedIngs=[...new Set(userGoals.flatMap(g=>goalSuggestions[g]||[]))];
    const steps=[{name:lang==='bg'?'Измивен продукт':'Cleanser',note:lang==='bg'?'Сутрин и вечер':'Morning & evening'},{name:lang==='bg'?'Тоник':'Toner',note:lang==='bg'?'По желание':'Optional'},{name:lang==='bg'?'Серум':'Serum',note:lang==='bg'?'Активни съставки':'Active ingredients'},{name:lang==='bg'?'Хидратиращ крем':'Moisturiser',note:lang==='bg'?'Заключва хидратацията':'Locks in hydration'},{name:'SPF',note:lang==='bg'?'Само сутрин':'Morning only'}];
    let html=`<div class="alert info" style="margin-bottom:14px"><div class="alert-icon">✨</div><div>
      <div class="alert-title">${lang==='bg'?'Препоръки за теб':'Recommendations for you'}</div>
      ${suggestedIngs.length>0?`<div class="alert-desc">${lang==='bg'?'Търси продукти с:':'Look for products with:'} ${suggestedIngs.join(', ')}</div>`:''}
    </div></div>`;
    html+=`<div class="clabel">${lang==='bg'?'Структура на рутина':'Routine structure'}</div>`;
    html+=steps.map((s,i)=>`<div class="step-card"><div class="step-num am">${i+1}</div><div style="flex:1"><div class="step-name">${s.name}</div><div class="step-note">${s.note}</div></div></div>`).join('');
    el.innerHTML=html;
  }
}

function renderProfileTab(){
  const el=document.getElementById('tab-content-profile');
  if(!profile){el.innerHTML='';return;}
  const l=lang;
  const skinType=SKIN_TYPES.find(s=>s.v===profile.skinType);
  const concerns=(profile.concerns||[]).map(v=>CONCERNS_LIST.find(c=>c.v===v)).filter(Boolean);
  const goals=(profile.goals||[]).map(v=>GOALS_LIST.find(g=>g.v===v)).filter(Boolean);
  const sensitivities=(profile.sensitivities||[]).filter(v=>v!=='none').map(v=>SENSITIVITIES.find(s=>s.v===v)).filter(Boolean);
  let html=`<div style="text-align:center;padding:24px 0 20px">
    <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--mint-light),var(--rose-light));border:3px solid var(--rose);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;overflow:hidden">
      <svg width="48" height="60" viewBox="0 0 48 60" fill="none"><ellipse cx="24" cy="18" rx="13" ry="16" fill="var(--rose-mid,#E8A0B0)"/><path d="M5 60 C5 38 15 32 24 32 C33 32 43 38 43 60" fill="var(--rose-mid,#E8A0B0)"/></svg>
    </div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400">${skinType?skinType[l]||skinType.en:''} ${l==='bg'?'кожа':'skin'}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:4px">${myProducts.length} ${l==='bg'?'продукта':'products'}</div>
  </div>
  <div class="card">
    <div class="profile-row"><span style="font-size:14px">${t('skin_type')}</span><span style="font-size:13px;color:var(--rose-deep);font-weight:500">${skinType?skinType[l]||skinType.en:'—'}</span></div>
    <div class="profile-row" style="flex-direction:column;align-items:flex-start;gap:8px">
      <span style="font-size:14px">${t('concerns')}</span>
      <div>${concerns.map(c=>`<span class="multi-tag">${c.icon} ${c[l]||c.en}</span>`).join('')||'—'}</div>
    </div>
    <div class="profile-row" style="flex-direction:column;align-items:flex-start;gap:8px">
      <span style="font-size:14px">${t('goals')}</span>
      <div>${goals.map(g=>`<span class="multi-tag" style="background:var(--mint-light);color:var(--mint-deep)">${g.icon} ${g[l]||g.en}</span>`).join('')||'—'}</div>
    </div>
    ${sensitivities.length>0?`<div class="profile-row" style="flex-direction:column;align-items:flex-start;gap:8px">
      <span style="font-size:14px">${t('bad_ings')}</span>
      <div>${sensitivities.map(s=>`<span class="multi-tag" style="background:var(--bad-bg);color:var(--bad)">${s[l]||s.en}</span>`).join('')}</div>
    </div>`:''}
    ${profile.goodIngs?`<div class="profile-row" style="flex-direction:column;align-items:flex-start;gap:6px">
      <span style="font-size:14px">${t('good_ings')}</span><span style="font-size:12px;color:var(--ok)">${profile.goodIngs}</span>
    </div>`:''}
    ${profile.badIngs?`<div class="profile-row" style="flex-direction:column;align-items:flex-start;gap:6px">
      <span style="font-size:14px">${t('bad_ings')}</span><span style="font-size:12px;color:var(--bad)">${profile.badIngs}</span>
    </div>`:''}
  </div>
  <button class="btn-cta" style="width:100%;margin-bottom:8px" onclick="editProfile()">${t('edit_profile')}</button>
  <div class="card"><div class="profile-row" onclick="resetApp()" style="cursor:pointer">
    <span style="font-size:14px;color:var(--bad)">${t('reset')}</span>
  </div></div>`;
  el.innerHTML=html;
}

function editProfile(){
  obData={...profile};obStep=1;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-onboarding').classList.add('active');
  renderOnboarding();
}

function checkConflicts(np){
  const ex=myProducts.flatMap(p=>p.keyIngredients||[]).map(i=>i.toLowerCase());
  const ni=(np.keyIngredients||[]).map(i=>i.toLowerCase());
  return CONFLICTS.filter(c=>(ex.some(i=>i.includes(c.a))&&ni.some(i=>i.includes(c.b)))||(ni.some(i=>i.includes(c.a))&&ex.some(i=>i.includes(c.b))));
}

function extractKey(text){
  if(!text)return[];
  return['retinol','vitamin c','ascorbic acid','niacinamide','hyaluronic acid','glycolic acid','salicylic acid','aha','bha','benzoyl peroxide','peptide','ceramide','spf','zinc','lactic acid','bakuchiol','squalane','azelaic acid','kojic acid'].filter(k=>text.toLowerCase().includes(k));
}

function resetApp(){if(confirm(lang==='bg'?'Изтриване на всички данни?':'Delete all data?')){localStorage.clear();location.reload();}}

document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});

if(profile){
  lang=localStorage.getItem('myskin_lang')||profile.lang||'en';
  document.getElementById('screen-onboarding').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  setLang(lang);renderTab('home');
}else{renderOnboarding();}
</script>
</body>
</html>
